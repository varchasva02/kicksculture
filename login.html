<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up | KicksCulture</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">KicksCulture</div>
      <p class="auth-subtitle">Welcome back! Sign in to your account</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" id="signupTab" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
          <span class="error-msg">Valid email is required</span>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
          <span class="error-msg">Password is required</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;">
          <label style="display:flex;align-items:center;gap:0.4rem;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--accent-primary);"> Remember me
          </label>
          <a href="#" style="color:var(--accent-primary);">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary">Login →</button>
        <div class="auth-divider">or</div>
        <button type="button" class="btn-secondary" style="width:100%;justify-content:center;" onclick="showToast('Google login (demo only)','info')">
          🔵 Continue with Google
        </button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Enter your full name" required>
          <span class="error-msg">Name is required</span>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required>
          <span class="error-msg">Valid email is required</span>
        </div>
        <div class="form-group">
          <label for="signupPhone">Phone</label>
          <input type="tel" id="signupPhone" placeholder="10-digit phone number" maxlength="10" required>
          <span class="error-msg">Valid phone number required</span>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)" required minlength="6">
          <span class="error-msg">Min 6 characters required</span>
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Re-enter your password" required>
          <span class="error-msg">Passwords don't match</span>
        </div>
        <button type="submit" class="btn-primary">Create Account →</button>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
  <script>
    function switchAuthTab(tab) {
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
      
      const subtitle = document.querySelector('.auth-subtitle');
      subtitle.textContent = tab === 'login' ? 'Welcome back! Sign in to your account' : 'Create a new account to get started';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      let valid = true;

      document.querySelectorAll('#loginForm .form-group').forEach(g => g.classList.remove('has-error'));

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('loginEmail').closest('.form-group').classList.add('has-error');
        valid = false;
      }
      if (!password) {
        document.getElementById('loginPassword').closest('.form-group').classList.add('has-error');
        valid = false;
      }
      if (valid) {
        showToast('Login successful! (Demo)', 'success');
        setTimeout(() => window.location.href = 'index.html', 1500);
      }
    }

    function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const phone = document.getElementById('signupPhone').value.trim();
      const pass = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      let valid = true;

      document.querySelectorAll('#signupForm .form-group').forEach(g => g.classList.remove('has-error'));

      if (!name) { document.getElementById('signupName').closest('.form-group').classList.add('has-error'); valid = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('signupEmail').closest('.form-group').classList.add('has-error'); valid = false; }
      if (!/^\d{10}$/.test(phone)) { document.getElementById('signupPhone').closest('.form-group').classList.add('has-error'); valid = false; }
      if (pass.length < 6) { document.getElementById('signupPassword').closest('.form-group').classList.add('has-error'); valid = false; }
      if (pass !== confirm) { document.getElementById('signupConfirm').closest('.form-group').classList.add('has-error'); valid = false; }

      if (valid) {
        showToast('Account created successfully! (Demo)', 'success');
        setTimeout(() => switchAuthTab('login'), 1500);
      }
    }
  </script>
</body>
</html>
